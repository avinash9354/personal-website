<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant — Avinash Pandey</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <style>
    /* Full page chat adjustments */
    .ai-chat-layout { height: calc(100vh - 160px); }
    .ai-messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; }
    .chat-bubble.bot { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(179,0,255,0.2); }
    .chat-bubble.user { background: linear-gradient(135deg, var(--nebula-cyan), var(--nebula-purple)); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; }
    .typing span { width: 8px; height: 8px; background: var(--nebula-cyan); border-radius: 50%; display: inline-block; animation: blink 1.4s infinite both; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
  </style>
</head>
<body class="admin-body">
  <canvas id="three-canvas"></canvas>
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><a href="index.html" class="sidebar-logo">AVINASH.DEV</a><span class="sidebar-tagline">ADMIN PANEL</span></div>
      <div class="sidebar-profile"><div class="sidebar-avatar"><img src="assets/images/profile.png" alt="Avinash"><span class="online-dot"></span></div><div><span class="sidebar-user-name">Avinash Pandey</span><span class="sidebar-user-role">Administrator</span></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-section"><div class="sidebar-nav-section-title">Main</div>
          <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i>Dashboard</a>
          <a href="profile.html" class="sidebar-link"><i class="fas fa-user-circle"></i>Profile</a>
          <a href="messages.html" class="sidebar-link"><i class="fas fa-envelope"></i>Messages</a>
          <a href="projects.html" class="sidebar-link"><i class="fas fa-rocket"></i>Projects</a>
        </div>
        <div class="sidebar-nav-section"><div class="sidebar-nav-section-title">AI Tools</div>
          <a href="ai-assistant.html" class="sidebar-link active"><i class="fas fa-robot"></i>AI Assistant</a>
        </div>
        <div class="sidebar-nav-section"><div class="sidebar-nav-section-title">Settings</div>
           <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i>Settings</a>
           <a href="index.html" class="sidebar-link"><i class="fas fa-globe"></i>View Site</a>
           <a href="login.html" id="logout-btn" class="sidebar-link logout-link"><i class="fas fa-sign-out-alt"></i>Logout</a>
        </div>
      </nav>
    </aside>

    <main class="dashboard-main">
      <div class="dash-mobile-toggle" id="dash-mobile-toggle"><i class="fas fa-bars"></i></div>
      <div class="dash-topbar">
        <div class="dash-topbar-left"><h1>AI Assistant</h1><p>Powered by Gemini 2.0 — optimized for portfolio management</p></div>
        <div class="dash-topbar-right"><button class="neon-btn neon-btn-sm" id="clear-chat-btn"><i class="fas fa-trash"></i><span>Clear Chat</span></button></div>
      </div>

      <div class="ai-chat-layout">
        <div class="ai-sidebar">
          <div class="dash-chart-card" style="padding:20px;">
            <div class="dash-chart-title" style="margin-bottom:14px;">Quick Actions</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <button class="filter-btn" onclick="sendPrompt('Write a professional bio for my portfolio')">✍️ Write Bio</button>
              <button class="filter-btn" onclick="sendPrompt('Draft a project description for a 3D dashboard')">🌐 Project Desc</button>
              <button class="filter-btn" onclick="sendPrompt('How can I optimize my site for SEO?')">🔍 SEO Tips</button>
            </div>
          </div>
        </div>

        <div class="ai-chat-main">
          <div class="ai-messages" id="chatbot-messages">
            <!-- Messages will appear here -->
          </div>
          <div class="ai-input-area">
            <textarea id="chatbot-input-field" placeholder="Ask Nova anything..." rows="1"></textarea>
            <button class="ai-send-btn" id="chatbot-send"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="assets/js/three-background.js"></script>
  <script src="assets/js/gemini-chat.js"></script>
  <script>
    document.getElementById('clear-chat-btn').onclick = () => {
      document.getElementById('chatbot-messages').innerHTML = '';
      const event = new CustomEvent('chatbot-restart');
      document.dispatchEvent(event);
    };
    function sendPrompt(p) {
      const input = document.getElementById('chatbot-input-field');
      input.value = p;
      document.getElementById('chatbot-send').click();
    }
    document.getElementById('logout-btn')?.addEventListener('click', e=>{e.preventDefault();sessionStorage.clear();window.location.href='login.html';});
  </script>
</body>
</html>
