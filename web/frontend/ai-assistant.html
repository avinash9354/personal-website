<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant — Avinash Pandey</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <style>
    /* Full page chat adjustments */
    .ai-chat-layout { height: calc(100vh - 160px); display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
    .ai-chat-main { display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; overflow: hidden; backdrop-filter: blur(10px); }
    .ai-messages { flex-grow: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
    
    /* Glass Bubbles */
    .chat-bubble { max-width: 80%; padding: 14px 20px; border-radius: 20px; line-height: 1.6; font-size: 0.92rem; position: relative; transition: all 0.3s ease; }
    .chat-bubble.glass-bubble { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); align-self: flex-start; border-bottom-left-radius: 4px; color: var(--text-bright); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .chat-bubble.user { background: linear-gradient(135deg, var(--nebula-cyan), var(--nebula-purple)); color: #000; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500; box-shadow: 0 4px 15px rgba(0,245,255,0.2); }
    
    /* Stats Widget */
    .stats-mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .stat-mini { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
    .stat-mini .label { display: block; font-size: 0.65rem; text-transform: uppercase; color: var(--text-dim); margin-bottom: 2px; }
    .stat-mini .value { display: block; font-size: 1.1rem; font-weight: 700; color: var(--text-bright); }

    .typing span { width: 8px; height: 8px; background: var(--nebula-cyan); border-radius: 50%; display: inline-block; animation: blink 1.4s infinite both; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    
    /* Animations */
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="admin-body">
  <canvas id="three-canvas"></canvas>
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><a href="index.html" class="sidebar-logo">AVINASH.DEV</a><span class="sidebar-tagline">ADMIN PANEL</span></div>
      <div class="sidebar-profile"><div class="sidebar-avatar"><img src="assets/images/profile.png" alt="Avinash"><span class="online-dot"></span></div><div><span class="sidebar-user-name">Avinash Pandey</span><span class="sidebar-user-role">Administrator</span></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-nav-section"><div class="sidebar-nav-section-title">Main</div>
          <a href="dashboard.html" class="sidebar-link"><i class="fas fa-th-large"></i>Dashboard</a>
          <a href="profile.html" class="sidebar-link"><i class="fas fa-user-circle"></i>Profile</a>
          <a href="messages.html" class="sidebar-link"><i class="fas fa-envelope"></i>Messages</a>
          <a href="projects.html" class="sidebar-link"><i class="fas fa-rocket"></i>Projects</a>
        </div>
        <div class="sidebar-nav-section"><div class="sidebar-nav-section-title">AI Tools</div>
          <a href="ai-assistant.html" class="sidebar-link active"><i class="fas fa-robot"></i>AI Assistant</a>
        </div>
        <div class="sidebar-nav-section"><div class="sidebar-nav-section-title">Settings</div>
           <a href="settings.html" class="sidebar-link"><i class="fas fa-cog"></i>Settings</a>
           <a href="index.html" class="sidebar-link"><i class="fas fa-globe"></i>View Site</a>
           <a href="login.html" id="logout-btn" class="sidebar-link logout-link"><i class="fas fa-sign-out-alt"></i>Logout</a>
        </div>
      </nav>
    </aside>

    <main class="dashboard-main">
      <div class="dash-mobile-toggle" id="dash-mobile-toggle"><i class="fas fa-bars"></i></div>
      <div class="dash-topbar">
        <div class="dash-topbar-left">
            <h1>Advanced AI Assistant</h1>
            <p>Portfolio Manager Mode — Intelligent System Awareness Active</p>
        </div>
        <div class="dash-topbar-right">
            <button class="neon-btn neon-btn-sm" id="clear-chat-btn"><i class="fas fa-trash"></i><span>Clear History</span></button>
        </div>
      </div>

      <div class="ai-chat-layout">
        <div class="ai-sidebar animate-fade-in">
          <div class="dash-chart-card glass-card" style="padding:20px;">
            <div class="dash-chart-title" style="margin-bottom:14px; color: var(--nebula-cyan);">Admin Shortcuts</div>
            <div style="display:flex;flex-direction:column;gap:10px;">
              <button class="filter-btn" onclick="sendPrompt('Summarize my recent messages')"><i class="fas fa-list-ul"></i> Summarize Messages</button>
              <button class="filter-btn" onclick="sendPrompt('Suggest a new project based on my skills')"><i class="fas fa-lightbulb"></i> Project Ideas</button>
              <button class="filter-btn" onclick="sendPrompt('How is my site performing?')"><i class="fas fa-chart-line"></i> Site Health</button>
              <button class="filter-btn" onclick="sendPrompt('Help me write a professional bio')"><i class="fas fa-pen-fancy"></i> Write Bio</button>
            </div>
          </div>
        </div>

        <div class="ai-chat-main">
          <div class="ai-messages" id="chatbot-messages">
            <!-- Messages will appear here -->
          </div>
          <div class="ai-input-area" style="padding: 20px; background: rgba(0,0,0,0.2);">
            <textarea id="chatbot-input-field" placeholder="Collaborate with Nova..." rows="1" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 15px;"></textarea>
            <button class="ai-send-btn" id="chatbot-send" style="margin-left:10px;"><i class="fas fa-paper-plane"></i></button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="assets/js/three-background.js"></script>
  <script src="assets/js/admin-ai.js"></script>
  <script>
    document.getElementById('clear-chat-btn').onclick = () => {
      document.getElementById('chatbot-messages').innerHTML = '';
      const event = new CustomEvent('chatbot-restart');
      document.dispatchEvent(event);
    };
    function sendPrompt(p) {
      const input = document.getElementById('chatbot-input-field');
      input.value = p;
      document.getElementById('chatbot-send').click();
    }
    document.getElementById('logout-btn')?.addEventListener('click', e=>{e.preventDefault();sessionStorage.clear();window.location.href='login.html';});
  </script>
</body>
</html>
